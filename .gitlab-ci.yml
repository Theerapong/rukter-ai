workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'

default:
  tags:
    - mac-mini-runner

stages:
  - test
  - package
  - deploy
  - verify

variables:
  DOCKER_BUILDKIT: "1"
  DOCR_REGION: "sgp1"
  DOCR_REGISTRY_NAME: "rukter-ai"
  DOCR_REPOSITORY_NAME: "rukter-ai-launch-agent"
  DOCR_SUBSCRIPTION_TIER: "starter"
  PUBLIC_CONTAINER_IMAGE: "ghcr.io/theerapong/rukter-ai:latest"
  PORT: "3017"
  SMOKE_BASE_URL: "http://127.0.0.1:3017"
  TF_DO_ENV_DIR: "${CI_PROJECT_DIR}/infra/terraform/environments/digitalocean"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_CLI_ARGS: "-no-color"
  TF_HTTP_ADDRESS: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/rukter-ai-digitalocean"
  TF_HTTP_LOCK_ADDRESS: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/rukter-ai-digitalocean/lock"
  TF_HTTP_UNLOCK_ADDRESS: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/rukter-ai-digitalocean/lock"
  TF_HTTP_USERNAME: "gitlab-ci-token"
  TF_HTTP_PASSWORD: "${CI_JOB_TOKEN}"
  TF_HTTP_LOCK_METHOD: "POST"
  TF_HTTP_UNLOCK_METHOD: "DELETE"
  TF_HTTP_RETRY_WAIT_MIN: "5"
  DEPLOYMENT_DRAIN_TTL_SECONDS: "21600"
  DEPLOYMENT_EDGE_GATE_TTL_SECONDS: "21600"
  # Apply is locally bounded well inside both 6h fences and the 4h job timeout.
  DEPLOYMENT_APPLY_DEADLINE_SECONDS: "12600"
  DEPLOYMENT_APPLY_RENEW_INTERVAL_SECONDS: "300"
  DEPLOYMENT_APPLY_READINESS_INTERVAL_SECONDS: "15"
  # One-time bridge from the release immediately before the durable drain API.
  # An absent-route fallback is accepted only when this exact SHA is CI_COMMIT_BEFORE_SHA;
  # every later main pipeline fails closed if the drain endpoint is unavailable.
  DEPLOYMENT_DRAIN_LEGACY_PARENT_SHA: "d21ae81bc667db6bb6915137fb781dc05375c8c7"

node:smoke:
  stage: test
  script:
    - node --version
    - npm ci --no-audit --no-fund
    - node --check server.mjs
    - node --check public/app.js
    - node --check scripts/smoke.mjs
    - python3 -m py_compile amd-worker/app.py amd-worker/gpu_telemetry.py amd-worker/identity_guard.py amd-worker/run_story_pipeline.py
    - bash -n scripts/assert-current-main-sha.sh scripts/assert-production-targets.sh scripts/bootstrap-persistent-amd.sh scripts/deployment-drain.sh scripts/deployment-edge-gate.sh scripts/prune-docr-repository.sh scripts/run-terraform-apply-with-watchdog.sh scripts/verify-live-deployment.sh scripts/wait-live-amd-queue-idle.sh amd-worker/bootstrap.sh amd-worker/run_story_pipeline.sh
    - unset FIREWORKS_API_KEY DIGITALOCEAN_TOKEN AMD_GPU_DIGITALOCEAN_TOKEN AMD_GPU_PUBLIC_ENABLED AMD_GPU_ORCHESTRATOR_URL
    - npm test
    - grep -Fq 'COPY amd-worker ./amd-worker' Dockerfile
    - export PORT="$((33000 + (CI_JOB_ID % 2000)))"
    - export SMOKE_BASE_URL="http://127.0.0.1:${PORT}"
    - export STARTUP_STARTED_AT="$(node -e 'console.log(Date.now())')"
    - mkdir -p .ci-artifacts
    - node server.mjs > .ci-artifacts/server.log 2>&1 &
    - export SERVER_PID=$!
    - trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
    - |
      ready=0
      for attempt in $(seq 1 30); do
        if curl -fsS "${SMOKE_BASE_URL}/health" >/dev/null; then
          ready=1
          break
        fi
        sleep 1
      done
      test "${ready}" = "1"
      STARTUP_MS="$(node -e 'console.log(Date.now() - Number(process.env.STARTUP_STARTED_AT))')"
      echo "Container-ready contract: ${STARTUP_MS}ms / 60000ms"
      test "${STARTUP_MS}" -lt 60000
    - curl -fsS "${SMOKE_BASE_URL}/amd-worker/bootstrap.sh" | grep -Fq '#!/usr/bin/env bash'
    - npm run smoke
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - .ci-artifacts/server.log

docker:amd64-build:
  stage: package
  services: []
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - docker version
    - docker buildx create --use --name rukter-ai-ci-builder || docker buildx use rukter-ai-ci-builder
    - docker buildx build --platform linux/amd64 -t "rukter-ai:${CI_COMMIT_SHORT_SHA:-ci}" --load .
    - export IMAGE_PLATFORM="$(docker image inspect "rukter-ai:${CI_COMMIT_SHORT_SHA:-ci}" --format '{{.Architecture}}/{{.Os}}')"
    - |
      echo "Image platform contract: ${IMAGE_PLATFORM}"
    - test "${IMAGE_PLATFORM}" = "amd64/linux"

build:docr:digitalocean:
  stage: package
  resource_group: rukter-ai-terraform-digitalocean
  services: []
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  needs:
    - node:smoke
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_REF_PROTECTED == "true"'
  script:
    - test -n "${DIGITALOCEAN_TOKEN:-}"
    - docker version
    - |
      DO_API="https://api.digitalocean.com/v2"
      DO_METADATA="$({
        set -euo pipefail
        DO_HEADER_FILE="$(mktemp "${TMPDIR:-/tmp}/rukter-do-headers.XXXXXX")"
        chmod 600 "${DO_HEADER_FILE}"
        trap 'rm -f "${DO_HEADER_FILE}"' EXIT
        {
          printf 'Accept: application/json\n'
          printf 'Authorization: Bearer %s\n' "${DIGITALOCEAN_TOKEN}"
        } > "${DO_HEADER_FILE}"
        REGISTRIES_JSON="$(curl -fsS --header "@${DO_HEADER_FILE}" "${DO_API}/registries")"
        REGISTRY_NAME="$(printf '%s' "${REGISTRIES_JSON}" | jq -r --arg name "${DOCR_REGISTRY_NAME}" '.registries[]? | select(.name == $name) | .name' | head -n 1)"
        ACCOUNT_EMAIL="$(curl -fsS --header "@${DO_HEADER_FILE}" "${DO_API}/account" | jq -r '.account.email // empty')"
        printf '%s\n%s\n' "${REGISTRY_NAME}" "${ACCOUNT_EMAIL}"
      })"
      REGISTRY_NAME="$(sed -n '1p' <<<"${DO_METADATA}")"
      ACCOUNT_EMAIL="$(sed -n '2p' <<<"${DO_METADATA}")"
      test -n "${REGISTRY_NAME}"
      test -n "${ACCOUNT_EMAIL}"
      export DOCR_REGISTRY_NAME="${REGISTRY_NAME}"
      export DOCR_IMAGE_TAG="${CI_COMMIT_SHORT_SHA}-${CI_PIPELINE_IID}"
      export DOCR_IMAGE_URI="registry.digitalocean.com/${DOCR_REGISTRY_NAME}/${DOCR_REPOSITORY_NAME}:${DOCR_IMAGE_TAG}"
      printf '%s' "${DIGITALOCEAN_TOKEN}" | docker login registry.digitalocean.com --username "${ACCOUNT_EMAIL}" --password-stdin
    - docker buildx create --use --name rukter-ai-docr-builder || docker buildx use rukter-ai-docr-builder
    - |
      set -o pipefail
      build_log="$(mktemp)"
      trap 'rm -f "${build_log}"' EXIT
      if docker buildx build --platform linux/amd64 --provenance=false --push -t "${DOCR_IMAGE_URI}" . 2>&1 | tee "${build_log}"; then
        :
      elif grep -Eiq 'quota[[:space:]]+exceeded' "${build_log}"; then
        echo "DOCR quota is full; pruning stale manifests while preserving the active deployment and recent manifests."
        bash scripts/prune-docr-repository.sh
        printf '%s' "${DIGITALOCEAN_TOKEN}" | docker login registry.digitalocean.com --username "${ACCOUNT_EMAIL}" --password-stdin
        docker buildx build --platform linux/amd64 --provenance=false --push -t "${DOCR_IMAGE_URI}" .
      else
        exit 1
      fi
    - docker buildx imagetools inspect "${DOCR_IMAGE_URI}"
    - printf 'DOCR_REGISTRY_NAME=%s\nDOCR_REPOSITORY_NAME=%s\nDOCR_IMAGE_TAG=%s\nDOCR_IMAGE_URI=%s\n' "${DOCR_REGISTRY_NAME}" "${DOCR_REPOSITORY_NAME}" "${DOCR_IMAGE_TAG}" "${DOCR_IMAGE_URI}" > digitalocean-build.env
  artifacts:
    reports:
      dotenv: digitalocean-build.env

terraform:validate:digitalocean:
  stage: deploy
  needs: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - terraform -chdir="${TF_DO_ENV_DIR}" init -backend=false -input=false
    - terraform -chdir="${TF_DO_ENV_DIR}" fmt -check -recursive
    - terraform -chdir="${TF_DO_ENV_DIR}" validate

terraform:apply:digitalocean:
  stage: deploy
  tags:
    - rukter-ai-production
  variables:
    RUKTER_AI_DEPLOYMENT_PRODUCTION: "true"
    RUKTER_AI_PUBLIC_URL: "https://rukter.ai"
    DEPLOYMENT_EDGE_GATE_PUBLIC_URL: "https://rukter.ai"
    DEPLOYMENT_EDGE_GATE_API_URL: "https://api.cloudflare.com/client/v4"
    DEPLOYMENT_EDGE_GATE_ZONE_NAME: "rukter.ai"
    DEPLOYMENT_DRAIN_DIGITALOCEAN_API_URL: "https://api.digitalocean.com/v2"
    AMD_GPU_DIGITALOCEAN_API_URL: "https://api.digitalocean.com/v2"
    AMD_GPU_PERSISTENT_TAG: "rukter-product-story-persistent"
    AMD_GPU_WORKER_SOURCE_BASE_URL: "https://rukter.ai/amd-worker"
    AMD_GPU_ORCHESTRATOR_URL: "http://127.0.0.1:3017"
  interruptible: false
  timeout: 4h
  resource_group: rukter-ai-terraform-digitalocean
  needs:
    - job: build:docr:digitalocean
      artifacts: true
    - terraform:validate:digitalocean
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_REF_PROTECTED == "true"'
  script:
    - test "${CI_COMMIT_REF_PROTECTED:-}" = "true" || { echo "Production deploy requires a protected Git ref on the isolated rukter-ai-production runner." >&2; exit 1; }
    - test "${RUKTER_AI_DEPLOYMENT_PRODUCTION:-}" = "true" || { echo "Production deploy scripts must run in production pin mode." >&2; exit 1; }
    - test "${RUKTER_AI_PUBLIC_URL:-}" = "https://rukter.ai" || { echo "Production deploy requires RUKTER_AI_PUBLIC_URL=https://rukter.ai." >&2; exit 1; }
    - test "${DEPLOYMENT_EDGE_GATE_PUBLIC_URL:-}" = "https://rukter.ai" || { echo "Production deploy requires DEPLOYMENT_EDGE_GATE_PUBLIC_URL=https://rukter.ai." >&2; exit 1; }
    # This project variable must be configured as both protected and masked.
    # Check it before acquiring either production fence.
    - test -n "${RUKTER_AI_CLOUDFLARE_API_TOKEN:-}" || { echo "RUKTER_AI_CLOUDFLARE_API_TOKEN must be a protected, masked rukter.ai Zone Read + Zone WAF Edit token; refusing any production mutation." >&2; exit 1; }
    - test "${DEPLOYMENT_EDGE_GATE_API_URL:-}" = "https://api.cloudflare.com/client/v4" || { echo "Production deploy forbids a Cloudflare API override." >&2; exit 1; }
    - test "${DEPLOYMENT_EDGE_GATE_ZONE_NAME:-}" = "rukter.ai" || { echo "Production deploy requires the exact rukter.ai Cloudflare zone." >&2; exit 1; }
    - test "${DEPLOYMENT_DRAIN_DIGITALOCEAN_API_URL:-}" = "https://api.digitalocean.com/v2" || { echo "Production drain requires the official DigitalOcean API URL." >&2; exit 1; }
    - test "${AMD_GPU_DIGITALOCEAN_API_URL:-}" = "https://api.digitalocean.com/v2" || { echo "Production AMD orchestration requires the official DigitalOcean API URL." >&2; exit 1; }
    - test "${AMD_GPU_PERSISTENT_TAG:-}" = "rukter-product-story-persistent" || { echo "Production requires the exact persistent AMD worker tag." >&2; exit 1; }
    - test "${AMD_GPU_WORKER_SOURCE_BASE_URL:-}" = "https://rukter.ai/amd-worker" || { echo "Production AMD bootstrap requires the exact same-origin worker source." >&2; exit 1; }
    - test "${AMD_GPU_ORCHESTRATOR_URL:-}" = "http://127.0.0.1:3017" || { echo "Production requires the in-process loopback AMD orchestrator endpoint." >&2; exit 1; }
    - bash scripts/assert-production-targets.sh
    - test -n "${DIGITALOCEAN_TOKEN:-}"
    - test -n "${AMD_GPU_DIGITALOCEAN_TOKEN:-}"
    - test -n "${AMD_GPU_ORCHESTRATOR_TOKEN:-}"
    - bash scripts/assert-current-main-sha.sh
    - mkdir -p .ci-artifacts
    - rm -f .ci-artifacts/deployment-drain.env .ci-artifacts/deployment-edge-gate.json
    - umask 077; printf 'pre_apply\n' > .ci-artifacts/deployment-phase; chmod 600 .ci-artifacts/deployment-phase
    - bash scripts/deployment-drain.sh acquire
    # First prove the existing app is idle without interrupting any request.
    - DEPLOYMENT_DRAIN_BOOTSTRAP_COMPATIBILITY=true bash scripts/wait-live-amd-queue-idle.sh
    # Then close public ingress at Cloudflare and require another continuous
    # idle window. The expiring gate remains held through Terraform apply,
    # persistent AMD bootstrap, and final live verification without mutating
    # the App Platform spec.
    - DEPLOYMENT_EDGE_GATE_PRODUCTION=true bash scripts/deployment-edge-gate.sh acquire
    - DEPLOYMENT_EDGE_GATE_PRODUCTION=true bash scripts/deployment-edge-gate.sh status
    - DEPLOYMENT_DRAIN_BOOTSTRAP_COMPATIBILITY=true DEPLOYMENT_EDGE_GATE_REQUIRED=true bash scripts/wait-live-amd-queue-idle.sh
    - terraform -chdir="${TF_DO_ENV_DIR}" init -input=false
    - export TF_VAR_image_repository="${DOCR_REPOSITORY_NAME}"
    - export TF_VAR_image_tag="${DOCR_IMAGE_TAG}"
    - export TF_VAR_app_commit_sha="${CI_COMMIT_SHA}"
    - export TF_VAR_deploy_timestamp="${DOCR_IMAGE_TAG}"
    - export TF_VAR_fireworks_api_key="${FIREWORKS_API_KEY:-}"
    - export TF_VAR_rukter_mcp_access_token="${RUKTER_MCP_ACCESS_TOKEN:-}"
    - export TF_VAR_amd_3d_worker_url="${AMD_3D_WORKER_URL:-}"
    - export TF_VAR_amd_3d_worker_token="${AMD_3D_WORKER_TOKEN:-}"
    - export TF_VAR_amd_gpu_orchestrator_url="${AMD_GPU_ORCHESTRATOR_URL}"
    - export TF_VAR_amd_gpu_orchestrator_token="${AMD_GPU_ORCHESTRATOR_TOKEN:-}"
    - export TF_VAR_amd_gpu_digitalocean_token="${AMD_GPU_DIGITALOCEAN_TOKEN:-}"
    - export TF_VAR_amd_gpu_region="${AMD_GPU_REGION:-atl1}"
    - export TF_VAR_amd_gpu_size="${AMD_GPU_SIZE:-gpu-mi300x1-192gb-devcloud}"
    - export TF_VAR_amd_gpu_image="${AMD_GPU_IMAGE:-amddevelopercloud-pytorch2100rocm724}"
    - export TF_VAR_amd_gpu_vpc_uuid="${AMD_GPU_VPC_UUID:-}"
    - export TF_VAR_amd_gpu_ssh_key_fingerprint="${AMD_GPU_SSH_KEY_FINGERPRINT:-}"
    - export TF_VAR_amd_gpu_ssh_key_name="${AMD_GPU_SSH_KEY_NAME:-}"
    - export TF_VAR_amd_gpu_lease_ttl_seconds="${AMD_GPU_LEASE_TTL_SECONDS:-1800}"
    - export TF_VAR_amd_gpu_queue_max_size="${AMD_GPU_QUEUE_MAX_SIZE:-25}"
    - export TF_VAR_amd_gpu_capacity_poll_ms="${AMD_GPU_CAPACITY_POLL_MS:-30000}"
    - export TF_VAR_amd_gpu_persistent_tag="${AMD_GPU_PERSISTENT_TAG:-rukter-product-story-persistent}"
    - export TF_VAR_amd_gpu_worker_source_base_url="${AMD_GPU_WORKER_SOURCE_BASE_URL}"
    - export TF_VAR_amd_gpu_capacity_state="${AMD_GPU_CAPACITY_STATE:-unavailable}"
    - export TF_VAR_amd_gpu_availability_reason="${AMD_GPU_AVAILABILITY_REASON:-AMD Developer Cloud capacity is checked live before each job.}"
    - export TF_VAR_amd_gpu_public_enabled="${AMD_GPU_PUBLIC_ENABLED:-false}"
    - export TF_VAR_amd_gpu_always_on_enabled="${AMD_GPU_ALWAYS_ON:-true}"
    - |
      if ! terraform -chdir="${TF_DO_ENV_DIR}" state show digitalocean_app.app >/dev/null 2>&1; then
        app_id="$({
          set -euo pipefail
          do_header_file="$(mktemp "${TMPDIR:-/tmp}/rukter-do-headers.XXXXXX")"
          chmod 600 "${do_header_file}"
          trap 'rm -f "${do_header_file}"' EXIT
          {
            printf 'Accept: application/json\n'
            printf 'Authorization: Bearer %s\n' "${DIGITALOCEAN_TOKEN}"
          } > "${do_header_file}"
          curl -fsS --header "@${do_header_file}" "https://api.digitalocean.com/v2/apps?per_page=200" \
            | jq -r --arg name "rukter-ai-launch-agent" '.apps[]? | select(.spec.name == $name) | .id' \
            | head -n 1
        })"
        test -n "${app_id}"
        terraform -chdir="${TF_DO_ENV_DIR}" import digitalocean_app.app "${app_id}"
      fi
    - terraform -chdir="${TF_DO_ENV_DIR}" plan -parallelism=20 -out=tfplan-live
    # Planning can take long enough for a tab or admitted request to reappear.
    # Require a new gated continuous idle window immediately before apply.
    - DEPLOYMENT_DRAIN_BOOTSTRAP_COMPATIBILITY=true DEPLOYMENT_EDGE_GATE_REQUIRED=true bash scripts/wait-live-amd-queue-idle.sh
    - bash scripts/assert-current-main-sha.sh
    - DEPLOYMENT_EDGE_GATE_REQUIRED=true bash scripts/deployment-drain.sh renew
    - DEPLOYMENT_EDGE_GATE_PRODUCTION=true bash scripts/deployment-edge-gate.sh renew
    - DEPLOYMENT_EDGE_GATE_PRODUCTION=true bash scripts/deployment-edge-gate.sh status
    - bash scripts/run-terraform-apply-with-watchdog.sh terraform -chdir="${TF_DO_ENV_DIR}" apply -parallelism=20 -auto-approve tfplan-live
    - DEPLOYMENT_EDGE_GATE_PRODUCTION=true bash scripts/deployment-edge-gate.sh status
    - DEPLOYMENT_EDGE_GATE_REQUIRED=true bash scripts/verify-live-deployment.sh
    # The bootstrap release had no old-app admission endpoint. From this point
    # onward, acquire the durable fence on the newly deployed app as well.
    - DEPLOYMENT_DRAIN_REQUIRE_SUPPORTED=true DEPLOYMENT_EDGE_GATE_REQUIRED=true bash scripts/deployment-drain.sh acquire
    - DEPLOYMENT_EDGE_GATE_REQUIRED=true bash scripts/deployment-drain.sh renew
    - DEPLOYMENT_DRAIN_BOOTSTRAP_COMPATIBILITY=true DEPLOYMENT_EDGE_GATE_REQUIRED=true bash scripts/wait-live-amd-queue-idle.sh
    - DEPLOYMENT_EDGE_GATE_REQUIRED=true bash scripts/deployment-drain.sh status
    - printf 'app_fenced\n' > .ci-artifacts/deployment-phase
    - bash scripts/bootstrap-persistent-amd.sh
    - DEPLOYMENT_EDGE_GATE_PRODUCTION=true bash scripts/deployment-edge-gate.sh status
    - DEPLOYMENT_EDGE_GATE_REQUIRED=true bash scripts/wait-live-amd-queue-idle.sh
    - DEPLOYMENT_EDGE_GATE_REQUIRED=true bash scripts/deployment-drain.sh status
    - DEPLOYMENT_EDGE_GATE_REQUIRED=true bash scripts/verify-live-deployment.sh
    - DEPLOYMENT_EDGE_GATE_PRODUCTION=true bash scripts/deployment-edge-gate.sh status
    - terraform -chdir="${TF_DO_ENV_DIR}" output
    - printf 'verification_complete\n' > .ci-artifacts/deployment-phase
    - DEPLOYMENT_EDGE_GATE_PRODUCTION=true bash scripts/deployment-edge-gate.sh release
    - printf 'edge_released\n' > .ci-artifacts/deployment-phase
    - bash scripts/deployment-drain.sh release
    - printf 'released\n' > .ci-artifacts/deployment-phase
  after_script:
    - |
      phase="$(sed -n '1p' .ci-artifacts/deployment-phase 2>/dev/null || true)"
      if [[ "${phase}" == "pre_apply" ]]; then
        echo "Deploy did not start; releasing this pipeline's edge gate and durable admission tag."
        edge_release_status=0
        drain_release_status=0
        # Recovery release is safe even when acquire failed after Cloudflare
        # accepted the rule but before the local 0600 state was written.
        DEPLOYMENT_EDGE_GATE_PRODUCTION=true bash scripts/deployment-edge-gate.sh release || edge_release_status=$?
        bash scripts/deployment-drain.sh release || drain_release_status=$?
        if [[ "${edge_release_status}" != "0" || "${drain_release_status}" != "0" ]]; then
          echo "A pre-apply fence could not be released cleanly; the remaining gate stays fail-closed."
        fi
      elif [[ "${phase}" == "apply_started" ]]; then
        echo "Terraform apply started, so an ambiguous or failed deployment keeps both fail-closed TTL fences in place; Cloudflare automatically reopens ingress when its TTL expires."
      elif [[ "${phase}" == "app_fenced" ]]; then
        echo "Persistent AMD bootstrap or final live verification did not finish; keeping both fail-closed TTL fences in place."
      elif [[ "${phase}" == "verification_complete" ]]; then
        echo "Final AMD and app verification passed; retrying ordered edge-then-durable fence release."
        edge_release_status=0
        DEPLOYMENT_EDGE_GATE_PRODUCTION=true bash scripts/deployment-edge-gate.sh release || edge_release_status=$?
        if [[ "${edge_release_status}" == "0" ]]; then
          bash scripts/deployment-drain.sh release || echo "Durable fence release still failed and will recover by TTL."
        else
          echo "Cloudflare gate release still failed; the durable fence remains locked until recovery."
        fi
      elif [[ "${phase}" == "edge_released" ]]; then
        echo "Public ingress is restored after verification; retrying durable fence release."
        bash scripts/deployment-drain.sh release || echo "Durable fence release still failed and will recover by TTL."
      fi
  environment:
    name: production/rukter-ai
    url: https://rukter.ai
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - .ci-artifacts/deployment-phase
      - .ci-artifacts/deployment-drain.env

verify:rukter-ai:digitalocean:
  stage: verify
  needs:
    - terraform:apply:digitalocean
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_REF_PROTECTED == "true"'
  script:
    - curl -fsS https://rukter.ai/health
    - curl -fsS https://rukter.ai/api/config | jq '{runtimePlatform,amdStoryOrchestratorConfigured,amdGpuPublicEnabled}'
    - curl -fsS https://rukter.ai/amd-worker/bootstrap.sh | grep -Fq '#!/usr/bin/env bash'

verify:public-image:
  stage: verify
  services: []
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_REF_PROTECTED == "true"'
  script:
    - docker logout ghcr.io || true
    - docker buildx imagetools inspect "${PUBLIC_CONTAINER_IMAGE}"
    - docker pull --platform linux/amd64 "${PUBLIC_CONTAINER_IMAGE}"
    - export PUBLIC_IMAGE_PLATFORM="$(docker image inspect "${PUBLIC_CONTAINER_IMAGE}" --format '{{.Architecture}}/{{.Os}}')"
    - |
      echo "Anonymous public image contract: ${PUBLIC_IMAGE_PLATFORM}"
    - test "${PUBLIC_IMAGE_PLATFORM}" = "amd64/linux"
